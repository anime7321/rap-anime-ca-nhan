<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rạp Anime Cá Nhân - Nguồn KKPhim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans">

    <header class="bg-gray-800 p-4 sticky top-0 z-50 shadow-lg border-b border-gray-700 flex justify-between items-center">
        <h1 class="text-2xl font-black text-blue-500 tracking-wider">MY<span class="text-white">ANIME</span></h1>
        <p class="text-sm text-gray-400 font-medium">Nguồn: KKPhim</p>
    </header>

    <main class="container mx-auto p-4 mt-4">
        <h2 class="text-xl font-bold mb-6 border-l-4 border-blue-500 pl-3 uppercase tracking-wide">Anime Mới Nhất</h2>
        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 lg:gap-6">
            <p class="text-gray-400 col-span-full text-center py-20 animate-pulse">Đang kết nối kho KKPhim...</p>
        </div>
    </main>

    <div id="player-modal" class="fixed inset-0 bg-black/95 z-50 hidden flex-col">
        <div class="p-4 flex justify-between items-center bg-gray-900 border-b border-gray-800">
            <h3 id="movie-title" class="text-lg font-bold text-white truncate pr-4">Đang tải phim...</h3>
            <button onclick="closePlayer()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded font-bold transition-colors">Đóng [X]</button>
        </div>
        <div class="flex-1 flex items-center justify-center p-4 w-full h-full">
            <iframe id="video-frame" class="w-full max-w-5xl h-[30vh] md:h-[60vh] lg:h-[80vh] rounded-lg shadow-2xl bg-black border-0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // Cấu hình API của KKPhim
        const API_LIST = 'https://phimapi.com/v1/api/danh-sach/hoat-hinh';
        const API_DETAIL = 'https://phimapi.com/phim/';
        const IMG_DOMAIN = 'https://phimimg.com/';

        // Tự động kéo danh sách phim
        async function fetchMovies() {
            try {
                const response = await fetch(API_LIST);
                const data = await response.json();
                
                // KKPhim trả về dữ liệu trong data.data.items
                const movies = data.data.items;
                const grid = document.getElementById('movie-grid');
                grid.innerHTML = ''; 

                movies.forEach(movie => {
                    const card = document.createElement('div');
                    card.className = 'bg-gray-800 rounded-lg overflow-hidden shadow-lg cursor-pointer hover:scale-105 transition-transform duration-300 group ring-1 ring-gray-700 flex flex-col';
                    card.onclick = () => openPlayer(movie.slug, movie.name);
                    
                    // Ghép domain ảnh của KKPhim với đường dẫn ảnh
                    const imgUrl = IMG_DOMAIN + movie.thumb_url;

                    card.innerHTML = `
                        <div class="relative aspect-[2/3] w-full">
                            <img src="${imgUrl}" alt="${movie.name}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center duration-300">
                                <svg class="w-16 h-16 text-blue-500 drop-shadow-lg" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"/></svg>
                            </div>
                        </div>
                        <div class="p-3 flex-1 flex flex-col justify-between">
                            <h3 class="font-bold text-sm truncate text-gray-100" title="${movie.name}">${movie.name}</h3>
                            <p class="text-xs text-gray-400 mt-1">${movie.year || 'Mới'}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error(error);
                document.getElementById('movie-grid').innerHTML = '<p class="text-red-500 col-span-full text-center">Lỗi kết nối máy chủ KKPhim. Hãy thử tải lại trang.</p>';
            }
        }

        // Mở trình phát
        async function openPlayer(slug, name) {
            document.getElementById('movie-title').innerText = "Đang phát: " + name;
            document.getElementById('player-modal').classList.remove('hidden');
            document.getElementById('player-modal').classList.add('flex');
            
            try {
                const response = await fetch(API_DETAIL + slug);
                const data = await response.json();
                
                // Trích xuất link Embed (Iframe) từ KKPhim
                const embedLink = data.episodes[0].server_data[0].link_embed;
                const iframe = document.getElementById('video-frame');
                
                // Gắn link vào iframe để bắt đầu phát
                iframe.src = embedLink;

            } catch (error) {
                document.getElementById('movie-title').innerText = "Lỗi tải luồng video từ KKPhim!";
            }
        }

        // Đóng trình phát
        function closePlayer() {
            const iframe = document.getElementById('video-frame');
            iframe.src = ''; // Xóa source để video ngừng chạy và ngừng phát tiếng
            document.getElementById('player-modal').classList.add('hidden');
            document.getElementById('player-modal').classList.remove('flex');
        }

        // Khởi chạy khi load trang
        fetchMovies();
    </script>
</body>
</html>
